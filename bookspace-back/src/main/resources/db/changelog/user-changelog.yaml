databaseChangeLog:
  - changeSet:
      id: 2-1
      author: yassine
      preConditions:
        - onFail: MARK_RAN
          onError: MARK_RAN
          not:
            tableExists:
              tableName: users
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_users
                  name: id
                  type: VARCHAR(36)
              - column:
                  constraints:
                    nullable: false
                  name: user_name
                  type: VARCHAR(15)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: password
                  type: VARCHAR(20)
              - column:
                  name: role
                  type: SMALLINT
              - column:
                  name: created_at
                  type: DATETIME
              - column:
                  name: updated_at
                  type: DATETIME
            tableName: users
  - changeSet:
      id: 2-2
      author: yassine
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addUniqueConstraint:
            columnNames: user_name
            constraintName: uc_users_username
            tableName: users
