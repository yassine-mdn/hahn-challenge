databaseChangeLog:
  - changeSet:
      id: 3
      author: yassine
      preConditions:
        - onFail: MARK_RAN
          onError: MARK_RAN
          not:
            tableExists:
              tableName: users
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_users
                  name: id
                  type: VARCHAR(36)
              - column:
                  constraints:
                    nullable: false
                  name: username
                  type: VARCHAR(15)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: password
                  type: VARCHAR(20)
              - column:
                  name: role
                  type: SMALLINT
              - column:
                  name: created_at
                  type: DATETIME
              - column:
                  name: updated_at
                  type: DATETIME
            tableName: users
  - changeSet:
      id: 4
      author: yassine
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      preConditions:
        - onFail: MARK_RAN
          onError: MARK_RAN
          not:
              uniqueConstraintExists:
                  tableName: users
                  constraintName: uc_users_username
      changes:
        - addUniqueConstraint:
            columnNames: username
            constraintName: uc_users_username
            tableName: users
